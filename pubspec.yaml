name: ztime_widget
description: "ZTime Widget — custom clock with analog face, digital display and Russian localization."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Localization / Date
  intl: ^0.20.2

  # Animations
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
