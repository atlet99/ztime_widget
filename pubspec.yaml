name: ztime_widget
description: "ZTime Widget — custom clock with analog face, digital display and Russian localization."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Localization
  slang: ^4.16.0
  slang_flutter: ^4.16.0

  # Responsive / Adaptive
  responsive_framework: ^1.5.1
  flutter_screenutil: ^5.9.3

  # Date
  intl: ^0.20.2

  # Animations
  flutter_animate: ^4.5.2

  # Keep screen on
  wakelock_plus: ^1.6.1
  home_widget: ^0.9.3
  workmanager: ^0.9.0+3
  android_intent_plus: ^6.0.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.3.1
  package_info_plus: ^10.1.0
  device_info_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4

  # Linting
  flutter_lints: ^6.0.0

  # App icon generation
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "ztime_logo.png"
  adaptive_icon_background: "ztime_logo_bg.png"
  adaptive_icon_foreground: "ztime_logo_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/glass/
